<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 — Vertix</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-50: #EFF6FF; --blue-100: #DBEAFE; --blue-200: #BFDBFE;
    --blue-400: #60A5FA; --blue-500: #3B82F6; --blue-600: #2563EB;
    --blue-700: #1D4ED8; --blue-900: #1E3A8A;
    --gray-50: #F8FAFC; --gray-100: #F1F5F9; --gray-200: #E2E8F0;
    --gray-400: #94A3B8; --gray-500: #64748B; --gray-600: #475569;
    --gray-800: #1E293B; --gray-900: #0F172A;
    --white: #FFFFFF;
    --font-main: 'Sora', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-body);
    background: var(--white);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* TOP NAV BAR */
  nav {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 60px; height: 68px;
    background: rgba(255,255,255,0.92); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--gray-100);
    z-index: 100;
  }
  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .nav-logo img { height: 32px; }
  .nav-logo-text { font-family: var(--font-main); font-size: 20px; font-weight: 700; color: var(--blue-600); letter-spacing: -0.5px; }
  .nav-links { display: flex; align-items: center; gap: 36px; list-style: none; }
  .nav-links a {
    font-size: 14px; font-weight: 500; color: var(--gray-600); text-decoration: none;
    transition: color 0.2s; position: relative;
  }
  .nav-links a::after {
    content: attr(data-text);
    display: block; font-weight: 600;
    height: 0; overflow: hidden; visibility: hidden; pointer-events: none;
  }
  .nav-links a:hover { color: var(--blue-600); }

  /* MAIN CONTENT (below nav) */
  .main-content {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* LEFT PANEL */
  .left-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 48px 70px;
    position: relative;
    background: var(--white);
    animation: fadeInLeft 0.7s ease both;
    overflow-y: auto;
  }

  .back-link {
    position: absolute;
    top: 28px; left: 70px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--gray-500);
    text-decoration: none;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--blue-600); }

  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 40px;
  }
  .logo-wrap img { height: 30px; }
  .logo-wrap span {
    font-family: var(--font-main);
    font-size: 20px;
    font-weight: 700;
    color: var(--blue-600);
    letter-spacing: -0.5px;
  }

  .login-heading {
    font-family: var(--font-main);
    font-size: 30px;
    font-weight: 700;
    color: var(--gray-900);
    letter-spacing: -0.7px;
    margin-bottom: 8px;
  }
  .login-sub {
    font-size: 15px;
    color: var(--gray-500);
    margin-bottom: 36px;
    line-height: 1.5;
  }

  /* SOCIAL BUTTONS */
  .social-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 13px 20px; border-radius: 10px;
    font-family: var(--font-body); font-size: 15px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; text-decoration: none;
    border: 1.5px solid var(--gray-200); background: var(--white); color: var(--gray-800);
    margin-bottom: 12px;
  }
  .social-btn:hover { border-color: var(--gray-400); background: var(--gray-50); }
  .social-btn svg { flex-shrink: 0; }

  /* DIVIDER */
  .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--gray-200); }
  .divider span { font-size: 12px; color: var(--gray-400); font-weight: 500; letter-spacing: 0.05em; }

  /* EMAIL FORM */
  .input-group { margin-bottom: 16px; }
  .input-label { display: block; font-size: 13px; font-weight: 500; color: var(--gray-700, #374151); margin-bottom: 6px; letter-spacing: 0.01em; }
  .input-field {
    width: 100%; padding: 12px 14px; border: 1.5px solid var(--gray-200); border-radius: 8px;
    font-family: var(--font-body); font-size: 15px; color: var(--gray-900);
    background: var(--white); outline: none; transition: border-color 0.2s;
  }
  .input-field:focus { border-color: var(--blue-400); }
  .input-field::placeholder { color: var(--gray-400); }

  .btn-vertix {
    width: 100%; padding: 13px; background: var(--blue-600); color: white;
    border: none; border-radius: 10px; font-family: var(--font-body); font-size: 15px;
    font-weight: 500; cursor: pointer; transition: all 0.2s; margin-top: 8px;
  }
  .btn-vertix:hover { background: var(--blue-700); }

  .login-footer { margin-top: 24px; font-size: 13px; color: var(--gray-500); text-align: center; }
  .login-footer a { color: var(--blue-600); text-decoration: none; font-weight: 500; }

  .email-section { display: none; animation: fadeUp 0.3s ease both; }
  .email-section.active { display: block; }

  /* RIGHT PANEL */
  .right-panel {
    width: 48%; position: relative; overflow: hidden;
    background: linear-gradient(145deg, var(--blue-600) 0%, var(--blue-900) 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 60px; animation: fadeInRight 0.7s ease both;
  }
  .right-panel-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.18; }
  .right-content { position: relative; z-index: 2; text-align: center; color: white; }
  .right-content .big-quote { font-family: var(--font-main); font-size: 32px; font-weight: 700; line-height: 1.3; letter-spacing: -0.8px; margin-bottom: 20px; }
  .right-content .big-quote span { opacity: 0.6; font-weight: 300; }
  .right-content p { font-size: 15px; opacity: 0.65; line-height: 1.6; max-width: 320px; margin: 0 auto 40px; }
  .right-dots { display: flex; gap: 8px; justify-content: center; margin-top: 40px; }
  .right-dots span { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3); }
  .right-dots span.active { background: white; width: 20px; border-radius: 3px; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.45); z-index: 200;
    align-items: center; justify-content: center; backdrop-filter: blur(4px);
  }
  .modal-overlay.active { display: flex; animation: fadeOverlay 0.2s ease both; }
  .modal {
    background: white; border-radius: 16px; padding: 40px; max-width: 380px; width: 90%;
    text-align: center; animation: popUp 0.3s ease both; border: 1px solid var(--gray-100);
  }
  .modal-icon { width: 56px; height: 56px; background: var(--blue-50); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
  .modal h3 { font-family: var(--font-main); font-size: 20px; font-weight: 700; color: var(--gray-900); margin-bottom: 10px; letter-spacing: -0.3px; }
  .modal p { font-size: 14px; color: var(--gray-500); line-height: 1.6; margin-bottom: 28px; }
  .modal-close { padding: 11px 32px; background: var(--blue-600); color: white; border: none; border-radius: 8px; font-family: var(--font-body); font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
  .modal-close:hover { background: var(--blue-700); }

  /* ANIMATIONS */
  @keyframes fadeInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes fadeInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeOverlay { from { opacity: 0; } to { opacity: 1; } }
  @keyframes popUp { from { opacity: 0; transform: scale(0.93) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
</style>
</head>
<body>

<!-- TOP NAV -->
<nav>
  <a href="index.html" class="nav-logo">
    <img src="assets/logo.png" alt="Vertix" onerror="this.style.display='none'">
    <span class="nav-logo-text">Vertix</span>
  </a>
  <ul class="nav-links">
    <li><a href="index.html#events">이벤트</a></li>
    <li><a href="index.html#projects">프로젝트</a></li>
    <li><a href="opensource.html">오픈소스 자료실</a></li>
  </ul>
</nav>

<!-- MAIN -->
<div class="main-content">

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <a href="index.html" class="back-link">← 홈으로</a>

    <div class="logo-wrap">
      <img src="assets/logo.png" alt="Vertix" onerror="this.style.display='none'">
      <span>Vertix</span>
    </div>

    <h1 class="login-heading">다시 만나서 반가워요</h1>
    <p class="login-sub">Vertix에 로그인해 프로젝트를 이어가세요.</p>

    <button class="social-btn" onclick="loginWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
        <path d="M3.964 10.707A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.96L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Google로 로그인
    </button>

    <button class="social-btn" onclick="showMaintenance()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect width="18" height="18" rx="4" fill="#2563EB"/>
        <text x="9" y="13" text-anchor="middle" fill="white" font-size="10" font-family="Sora, sans-serif" font-weight="700">V</text>
      </svg>
      Vertix 계정으로 로그인
    </button>

    <div class="divider"><span>또는 이메일로</span></div>

    <div class="email-section" id="emailSection">
      <div class="input-group">
        <label class="input-label">이메일</label>
        <input type="email" class="input-field" placeholder="hello@example.com">
      </div>
      <div class="input-group">
        <label class="input-label">비밀번호</label>
        <input type="password" class="input-field" placeholder="••••••••">
      </div>
      <button class="btn-vertix" onclick="showMaintenance()">로그인</button>
    </div>

    <button class="social-btn" id="emailToggleBtn" onclick="toggleEmail()" style="border-style: dashed;">
      ✉ 이메일로 계속하기
    </button>

    <div class="login-footer">
      계정이 없으신가요? <a href="#" onclick="showMaintenance(); return false;">회원가입</a>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <img src="assets/login-bg.jpg" class="right-panel-img" alt="" onerror="this.style.display='none'">
    <div class="right-content">
      <div class="big-quote">
        아이디어를<br><span>현실로.</span><br>함께라면.
      </div>
      <p>Vertix와 함께라면 어떤 프로젝트도 가능합니다. 지금 시작해보세요.</p>
      <div class="right-dots">
        <span class="active"></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>

</div>

<!-- MAINTENANCE MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" fill="#2563EB"/>
      </svg>
    </div>
    <h3>잠시 점검 중이에요</h3>
    <p>현재 오류로 인해 해당 로그인 방식이 일시적으로 중단되었습니다.<br>조금만 기다려 주세요!</p>
    <button class="modal-close" onclick="closeModal()">확인</button>
  </div>
</div>

<script>
  function loginWithGoogle() { showMaintenance(); }
  function showMaintenance() { document.getElementById('modalOverlay').classList.add('active'); }
  function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
  function toggleEmail() {
    const section = document.getElementById('emailSection');
    const btn = document.getElementById('emailToggleBtn');
    if (section.classList.contains('active')) {
      section.classList.remove('active');
      btn.textContent = '✉ 이메일로 계속하기';
    } else {
      section.classList.add('active');
      btn.style.display = 'none';
    }
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
</script>
</body>
</html>
