<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 데이터 학습 오픈소스 — Vertix</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-50: #EFF6FF; --blue-100: #DBEAFE; --blue-200: #BFDBFE;
    --blue-400: #60A5FA; --blue-500: #3B82F6; --blue-600: #2563EB; --blue-700: #1D4ED8;
    --gray-100: #F1F5F9; --gray-200: #E2E8F0; --gray-500: #64748B; --gray-800: #1E293B; --gray-900: #0F172A;
    --white: #FFFFFF;
    --font-main: 'Sora', sans-serif; --font-body: 'DM Sans', sans-serif; --font-mono: 'JetBrains Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; scrollbar-gutter: stable; }
  body { font-family: var(--font-body); background: var(--white); color: var(--gray-800); overflow-x: hidden; }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 68px; padding: 0 60px; display: flex; align-items: center; justify-content: space-between;
    background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--gray-100);
  }
  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .nav-logo img { height: 32px; }
  .nav-logo-text { font-family: var(--font-main); font-size: 20px; font-weight: 700; color: var(--blue-600); }
  .btn-login {
    font-size: 14px; font-weight: 500; color: var(--blue-600); text-decoration: none;
    padding: 8px 20px; border: 1.5px solid var(--blue-200); border-radius: 8px; background: var(--white);
  }

  .hero {
    padding: 120px 60px 40px;
    background: linear-gradient(160deg, #F0F7FF 0%, #FFFFFF 55%, #EFF6FF 100%);
  }
  .back-link {
    display: inline-flex; align-items: center; gap: 6px; margin-bottom: 20px;
    font-size: 13px; color: var(--blue-600); text-decoration: none;
  }
  .hero h1 {
    font-family: var(--font-main); font-size: clamp(32px, 4vw, 44px);
    font-weight: 700; color: var(--gray-900); letter-spacing: -1px; margin-bottom: 12px;
  }
  .hero p { font-size: 16px; line-height: 1.7; color: var(--gray-500); max-width: 600px; }

  .grid-section { padding: 24px 60px 80px; }
  .resources-grid { max-width: 860px; }

  .res-card {
    background: var(--white); border: 1.5px solid var(--blue-200); border-radius: 14px; overflow: hidden;
    display: flex; flex-direction: column; cursor: pointer;
  }
  .res-card-header { padding: 22px 22px 0; display: flex; align-items: flex-start; gap: 14px; }
  .res-icon {
    width: 44px; height: 44px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; background: var(--blue-50); flex-shrink: 0;
  }
  .res-category { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--blue-600); margin-bottom: 4px; }
  .res-title { font-family: var(--font-main); font-size: 18px; font-weight: 700; color: var(--gray-900); }
  .res-card-body { padding: 14px 22px; }
  .res-desc { font-size: 14px; color: var(--gray-500); line-height: 1.7; margin-bottom: 14px; }
  .res-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .res-tag {
    font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 20px;
    background: var(--blue-50); color: var(--blue-600); border: 1px solid var(--blue-100);
  }
  .res-card-footer {
    padding: 14px 22px; border-top: 1px solid var(--gray-100);
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .res-lang { display: flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 12px; color: var(--gray-500); }
  .res-lang-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--blue-500); }
  .copy-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 12px; border-radius: 6px; border: 1.5px solid var(--blue-200);
    background: var(--white); color: var(--blue-600); font-size: 12px; font-weight: 500; cursor: pointer;
  }

  .code-overlay {
    display: none; position: fixed; inset: 0; z-index: 500;
    background: rgba(15,23,42,0.6); align-items: center; justify-content: center; padding: 20px;
  }
  .code-overlay.open { display: flex; }
  .code-modal {
    background: #0F172A; border-radius: 16px; max-width: 760px; width: 100%;
    overflow: hidden; border: 1px solid rgba(255,255,255,0.08); max-height: 88vh; display: flex; flex-direction: column;
  }
  .code-modal-header {
    padding: 18px 24px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03);
  }
  .code-modal-title { font-family: var(--font-main); font-size: 15px; font-weight: 600; color: #FFFFFF; }
  .code-modal-actions { display: flex; align-items: center; gap: 8px; }
  .modal-copy-btn, .code-modal-close {
    border-radius: 6px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.9); cursor: pointer; font-size: 12px; font-family: var(--font-body);
  }
  .modal-copy-btn { padding: 6px 14px; display: inline-flex; align-items: center; gap: 5px; }
  .code-modal-close { width: 30px; height: 30px; font-size: 14px; }
  .code-modal-body { overflow-y: auto; }
  .code-block {
    font-family: var(--font-mono); font-size: 13px; line-height: 1.75; color: #E2E8F0;
    padding: 28px; white-space: pre; overflow-x: auto;
  }

  footer { background: var(--gray-900); color: white; padding: 36px 60px; }
  .footer-bottom { display: flex; align-items: center; justify-content: space-between; }
  .footer-bottom p { font-size: 13px; color: rgba(255,255,255,0.45); }

  @media (max-width: 900px) {
    nav { padding: 0 24px; }
    .hero { padding: 100px 24px 32px; }
    .grid-section { padding: 24px 24px 56px; }
    footer { padding: 28px 24px; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <img src="assets/logo.png" alt="Vertix" onerror="this.style.display='none'">
    <span class="nav-logo-text">Vertix</span>
  </a>
  <a href="login.html" class="btn-login">로그인</a>
</nav>

<section class="hero">
  <a href="index.html" class="back-link">← 홈으로</a>
  <h1>AI 데이터 학습 <span style="color:#2563EB;">오픈소스</span></h1>
  <p>실무에서 바로 사용할 수 있는 데이터셋 전처리 파이프라인 예시 코드입니다. 카드 1개만 유지했습니다.</p>
</section>

<section class="grid-section">
  <div class="resources-grid">
    <div class="res-card" id="resourceCard">
      <div class="res-card-header">
        <div class="res-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3L2 9l10 6 10-6-10-6z"></path><path d="M2 15l10 6 10-6"></path></svg>
        </div>
        <div>
          <div class="res-category">AI / Python</div>
          <div class="res-title">AI 데이터 학습 오픈소스</div>
        </div>
      </div>
      <div class="res-card-body">
        <div class="res-desc">CSV 데이터 로드, 결측치 처리, 스케일링, 학습/검증 데이터 분할까지 한 번에 처리하는 기본 학습 파이프라인입니다.</div>
        <div class="res-tags">
          <span class="res-tag">데이터 전처리</span>
          <span class="res-tag">머신러닝</span>
          <span class="res-tag">파이썬</span>
        </div>
      </div>
      <div class="res-card-footer">
        <div class="res-lang"><span class="res-lang-dot"></span>Python</div>
        <button class="copy-btn" id="copyBtn" onclick="copySnippet(event)">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          복사
        </button>
      </div>
    </div>
  </div>
</section>

<footer>
  <div class="footer-bottom">
    <p>© 2025 Vertix. All rights reserved.</p>
    <p>개인정보처리방침 · 이용약관</p>
  </div>
</footer>

<div class="code-overlay" id="codeOverlay" onclick="handleOverlay(event)">
  <div class="code-modal">
    <div class="code-modal-header">
      <span class="code-modal-title">AI 데이터 학습 오픈소스</span>
      <div class="code-modal-actions">
        <button class="modal-copy-btn" id="modalCopyBtn" onclick="copyFromModal(event)">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          복사하기
        </button>
        <button class="code-modal-close" onclick="closeModal()">✕</button>
      </div>
    </div>
    <div class="code-modal-body">
      <pre class="code-block" id="modalCode"></pre>
    </div>
  </div>
</div>

<script>
const SNIPPET = `import pandas as pd
from sklearn.model_selection import train_test_split
from sklearn.preprocessing import StandardScaler

def build_training_data(path):
    df = pd.read_csv(path)
    df = df.dropna()

    X = df.drop(columns=["label"])
    y = df["label"]

    scaler = StandardScaler()
    X_scaled = scaler.fit_transform(X)

    X_train, X_valid, y_train, y_valid = train_test_split(
        X_scaled, y, test_size=0.2, random_state=42, stratify=y
    )
    return X_train, X_valid, y_train, y_valid

if __name__ == "__main__":
    X_train, X_valid, y_train, y_valid = build_training_data("dataset.csv")
    print("train:", X_train.shape, "valid:", X_valid.shape)`;

let bodyScrollPad = 0;

document.getElementById('resourceCard').addEventListener('click', (e) => {
  if (e.target.closest('.copy-btn')) return;
  openModal();
});

function openModal() {
  document.getElementById('modalCode').textContent = SNIPPET;
  const scrollbarWidth = window.innerWidth - document.documentElement.clientWidth;
  bodyScrollPad = scrollbarWidth > 0 ? scrollbarWidth : 0;
  document.body.style.paddingRight = bodyScrollPad + 'px';
  document.body.style.overflow = 'hidden';
  document.getElementById('codeOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('codeOverlay').classList.remove('open');
  document.body.style.overflow = '';
  document.body.style.paddingRight = '';
}

function handleOverlay(e) {
  if (e.target === document.getElementById('codeOverlay')) closeModal();
}

function copySnippet(e) {
  e.stopPropagation();
  navigator.clipboard.writeText(SNIPPET);
}

function copyFromModal(e) {
  e.stopPropagation();
  navigator.clipboard.writeText(SNIPPET);
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});
</script>
</body>
</html>
